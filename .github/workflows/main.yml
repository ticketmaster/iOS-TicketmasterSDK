name: Deploy DocC to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download doccarchives from release
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p Frameworks
          curl -L --retry 3 --fail -o "TicketmasterAuthentication.doccarchive.zip" \
            "https://github.com/kinoroy/iOS-TicketmasterSDK/releases/download/${TAG}/TicketmasterAuthentication.doccarchive.zip"
          unzip -o "TicketmasterAuthentication.doccarchive.zip" -d Frameworks/
          rm "TicketmasterAuthentication.doccarchive.zip"
          curl -L --retry 3 --fail -o "TicketmasterDiscoveryAPI.doccarchive.zip" \
            "https://github.com/kinoroy/iOS-TicketmasterSDK/releases/download/${TAG}/TicketmasterDiscoveryAPI.doccarchive.zip"
          unzip -o "TicketmasterDiscoveryAPI.doccarchive.zip" -d Frameworks/
          rm "TicketmasterDiscoveryAPI.doccarchive.zip"
          curl -L --retry 3 --fail -o "TicketmasterPrePurchase.doccarchive.zip" \
            "https://github.com/kinoroy/iOS-TicketmasterSDK/releases/download/${TAG}/TicketmasterPrePurchase.doccarchive.zip"
          unzip -o "TicketmasterPrePurchase.doccarchive.zip" -d Frameworks/
          rm "TicketmasterPrePurchase.doccarchive.zip"
          curl -L --retry 3 --fail -o "TicketmasterPurchase.doccarchive.zip" \
            "https://github.com/kinoroy/iOS-TicketmasterSDK/releases/download/${TAG}/TicketmasterPurchase.doccarchive.zip"
          unzip -o "TicketmasterPurchase.doccarchive.zip" -d Frameworks/
          rm "TicketmasterPurchase.doccarchive.zip"
          curl -L --retry 3 --fail -o "TicketmasterTickets.doccarchive.zip" \
            "https://github.com/kinoroy/iOS-TicketmasterSDK/releases/download/${TAG}/TicketmasterTickets.doccarchive.zip"
          unzip -o "TicketmasterTickets.doccarchive.zip" -d Frameworks/
          rm "TicketmasterTickets.doccarchive.zip"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
