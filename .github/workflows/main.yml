name: Deploy DocC to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download doccarchives from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p Frameworks
          gh release view "${TAG}" --json assets --jq '.assets[].name' \
            | grep '\.doccarchive\.zip$' \
            | while read -r asset; do
                gh release download "${TAG}" --pattern "${asset}" --dir .
                unzip -o "${asset}" -d Frameworks/
                rm "${asset}"
              done

      - name: Process doccarchives for static hosting
        run: |
          mkdir -p docs
          for archive in Frameworks/*.doccarchive; do
            name=$(basename "${archive}" .doccarchive)
            echo "Processing ${name}..."
            $(xcrun --find docc) process-archive \
              transform-for-static-hosting "${archive}" \
              --output-path "docs/${name}" \
              --hosting-base-path "iOS-TicketmasterSDK/docs/${name}"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
